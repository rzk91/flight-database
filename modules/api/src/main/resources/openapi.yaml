openapi: 3.1.0

info:
  title: Flight Database API
  version: "1.0.0"
  description: |
    A catalogue of the static aviation world — airlines, airports, airplane models,
    and the scheduled routes between them.

    ## Query grammar (applies to every resource)

    Almost every resource shares one uniform shape. `{res}` is the resource path
    segment (e.g. `airports`, `countries`).

    | Purpose      | Shape |
    |--------------|-------|
    | List         | `GET /{res}?return-only={field}&sort-by={field}&order={asc\|desc}&limit={n}&offset={n}` |
    | Filter       | `GET /{res}/filter?field={f}&operator={op}&value={v}&sort-by=&order=&limit=&offset=` |
    | Sub-filter   | `GET /{res}/{relation}/filter?field={f}&operator={op}&value={v}&…` (filter `{res}` by a field of a related entity) |
    | Single by id | `GET\|HEAD\|PUT\|PATCH\|DELETE /{res}/{id}` |
    | Create       | `POST /{res}` |

    - **`field`** is any property name of the targeted entity's schema, in
      `snake_case` (e.g. `country_code`, `main_language_id`).
    - **`value`** is a single value for most operators; a **comma-separated list**
      for `in` / `not_in`; and exactly **two** comma-separated bounds for `range`.
    - **`return-only`** projects a list down to a single field.

    ### Operators
    `eq` `neq` `is` `is_not` `gt` `gteq` `lt` `lteq` `regex_match` `range`
    `in` `not_in` `starts_with` `ends_with` `contains` `not_contains`.

    > **Known limitation (multi-slot filters).** `GET /countries/language/filter`
    > spans the three language slots (main/secondary/tertiary) and
    > `GET /airline-routes/airport/filter` (with neither `inbound` nor `outbound`)
    > spans start/destination. They are implemented as a `UNION` of per-slot
    > matches, which is correct for positive operators but **wrong for the
    > exclusion operators** (`neq`, `is_not`, `not_in`, `not_contains`): a row is
    > wrongly kept when the excluded value sits in a *different* slot. The intended
    > semantics is any/none — a country/route matches an exclusion filter only when
    > the value appears in *no* slot. Fix is pending.

    ### Status codes
    `200` ok (lists return `200` with a message when empty) · `201` created ·
    `204` deleted · `400` invalid field/operator/value/id or inconsistent ids ·
    `404` not found · `409` already exists · `422` SQL/constraint error ·
    `500` unknown error · `501` not implemented.

servers:
  - url: http://localhost:18181/v1/flightdb
    description: Local development

tags:
  - name: Hello-World
  - name: Airlines
  - name: Airline-Airplanes (Fleet)
  - name: Airline-Cities (HubCity)
  - name: Airline-Routes
  - name: Airplanes
  - name: Airports
  - name: Cities
  - name: Countries
  - name: Currencies
  - name: Languages
  - name: Manufacturers

# ---------------------------------------------------------------------------
# Reusable building blocks
# ---------------------------------------------------------------------------
components:
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema: { type: integer, format: int64 }
    Field:
      name: field
      in: query
      required: true
      description: A property of the targeted entity's schema (snake_case).
      schema: { type: string }
    Operator:
      name: operator
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/Operator'
    Value:
      name: value
      in: query
      required: true
      description: >-
        Single value for most operators; comma-separated list for in/not_in;
        exactly two comma-separated bounds for range.
      schema: { type: string }
    ReturnOnly:
      name: return-only
      in: query
      required: false
      description: Project the list down to a single field.
      schema: { type: string }
    SortBy:
      name: sort-by
      in: query
      required: false
      schema: { type: string }
    Order:
      name: order
      in: query
      required: false
      schema: { type: string, enum: [asc, desc] }
    Limit:
      name: limit
      in: query
      required: false
      schema: { type: integer, format: int64, minimum: 0 }
    Offset:
      name: offset
      in: query
      required: false
      schema: { type: integer, format: int64, minimum: 0 }

  responses:
    BadRequest:
      description: Invalid field, operator, value, id format, or inconsistent ids.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Message' }
    NotFound:
      description: No entry with the given id.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Message' }
    Conflict:
      description: Entry already exists.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Message' }
    Unprocessable:
      description: SQL / constraint error (e.g. invalid foreign key).
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Message' }

  schemas:
    Operator:
      type: string
      default: eq
      enum:
        [eq, neq, is, is_not, gt, gteq, lt, lteq, regex_match, range, in,
         not_in, starts_with, ends_with, contains, not_contains]
    Message:
      type: object
      properties:
        error: { type: string }

    # ---- Entity schemas -------------------------------------------------
    Airline:
      type: object
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
        iata: { type: string }
        icao: { type: string }
        call_sign: { type: string }
        country_id: { type: integer, format: int64 }
    AirlineCreate:
      type: object
      required: [name, iata, icao, call_sign, country_id]
      properties:
        id: { type: [integer, "null"], format: int64 }
        name: { type: string }
        iata: { type: string }
        icao: { type: string }
        call_sign: { type: string }
        country_id: { type: integer, format: int64 }
    AirlinePatch:
      type: object
      properties:
        name: { type: string }
        iata: { type: string }
        icao: { type: string }
        call_sign: { type: string }
        country_id: { type: integer, format: int64 }

    AirlineAirplane:
      type: object
      properties:
        id: { type: integer, format: int64 }
        airline_id: { type: integer, format: int64 }
        airplane_id: { type: integer, format: int64 }
    AirlineAirplaneCreate:
      type: object
      required: [airline_id, airplane_id]
      properties:
        id: { type: [integer, "null"], format: int64 }
        airline_id: { type: integer, format: int64 }
        airplane_id: { type: integer, format: int64 }
    AirlineAirplanePatch:
      type: object
      properties:
        airline_id: { type: integer, format: int64 }
        airplane_id: { type: integer, format: int64 }

    AirlineCity:
      type: object
      properties:
        id: { type: integer, format: int64 }
        airline_id: { type: integer, format: int64 }
        city_id: { type: integer, format: int64 }
    AirlineCityCreate:
      type: object
      required: [airline_id, city_id]
      properties:
        id: { type: [integer, "null"], format: int64 }
        airline_id: { type: integer, format: int64 }
        city_id: { type: integer, format: int64 }
    AirlineCityPatch:
      type: object
      properties:
        airline_id: { type: integer, format: int64 }
        city_id: { type: integer, format: int64 }

    AirlineRoute:
      type: object
      properties:
        id: { type: integer, format: int64 }
        airline_airplane_id: { type: integer, format: int64 }
        route_number: { type: string }
        start_airport_id: { type: integer, format: int64 }
        destination_airport_id: { type: integer, format: int64 }
    AirlineRouteCreate:
      type: object
      required: [airline_airplane_id, route_number, start_airport_id, destination_airport_id]
      properties:
        id: { type: [integer, "null"], format: int64 }
        airline_airplane_id: { type: integer, format: int64 }
        route_number: { type: string }
        start_airport_id: { type: integer, format: int64 }
        destination_airport_id: { type: integer, format: int64 }
    AirlineRoutePatch:
      type: object
      properties:
        airline_airplane_id: { type: integer, format: int64 }
        route_number: { type: string }
        start_airport_id: { type: integer, format: int64 }
        destination_airport_id: { type: integer, format: int64 }

    Airplane:
      type: object
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
        manufacturer_id: { type: integer, format: int64 }
        capacity: { type: integer }
        max_range_in_km: { type: integer }
    AirplaneCreate:
      type: object
      required: [name, manufacturer_id, capacity, max_range_in_km]
      properties:
        id: { type: [integer, "null"], format: int64 }
        name: { type: string }
        manufacturer_id: { type: integer, format: int64 }
        capacity: { type: integer }
        max_range_in_km: { type: integer }
    AirplanePatch:
      type: object
      properties:
        name: { type: string }
        manufacturer_id: { type: integer, format: int64 }
        capacity: { type: integer }
        max_range_in_km: { type: integer }

    Airport:
      type: object
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
        icao: { type: string }
        iata: { type: string }
        city_id: { type: integer, format: int64 }
        number_of_runways: { type: integer }
        number_of_terminals: { type: integer }
        capacity: { type: integer, format: int64 }
        international: { type: boolean }
        junction: { type: boolean }
    AirportCreate:
      type: object
      required: [name, icao, iata, city_id, number_of_runways, number_of_terminals, capacity, international, junction]
      properties:
        id: { type: [integer, "null"], format: int64 }
        name: { type: string }
        icao: { type: string }
        iata: { type: string }
        city_id: { type: integer, format: int64 }
        number_of_runways: { type: integer }
        number_of_terminals: { type: integer }
        capacity: { type: integer, format: int64 }
        international: { type: boolean }
        junction: { type: boolean }
    AirportPatch:
      type: object
      properties:
        name: { type: string }
        icao: { type: string }
        iata: { type: string }
        city_id: { type: integer, format: int64 }
        number_of_runways: { type: integer }
        number_of_terminals: { type: integer }
        capacity: { type: integer, format: int64 }
        international: { type: boolean }
        junction: { type: boolean }

    City:
      type: object
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
        country_id: { type: integer, format: int64 }
        capital: { type: boolean }
        population: { type: integer, format: int64 }
        latitude: { type: number }
        longitude: { type: number }
        timezone: { type: string }
    CityCreate:
      type: object
      required: [name, country_id, capital, population, latitude, longitude, timezone]
      properties:
        id: { type: [integer, "null"], format: int64 }
        name: { type: string }
        country_id: { type: integer, format: int64 }
        capital: { type: boolean }
        population: { type: integer, format: int64 }
        latitude: { type: number }
        longitude: { type: number }
        timezone: { type: string }
    CityPatch:
      type: object
      properties:
        name: { type: string }
        country_id: { type: integer, format: int64 }
        capital: { type: boolean }
        population: { type: integer, format: int64 }
        latitude: { type: number }
        longitude: { type: number }
        timezone: { type: string }

    Country:
      type: object
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
        iso2: { type: string }
        iso3: { type: string }
        country_code: { type: integer }
        domain_name: { type: [string, "null"] }
        main_language_id: { type: integer, format: int64 }
        secondary_language_id: { type: [integer, "null"], format: int64 }
        tertiary_language_id: { type: [integer, "null"], format: int64 }
        currency_id: { type: integer, format: int64 }
        nationality: { type: string }
    CountryCreate:
      type: object
      required: [name, iso2, iso3, country_code, main_language_id, currency_id, nationality]
      properties:
        id: { type: [integer, "null"], format: int64 }
        name: { type: string }
        iso2: { type: string }
        iso3: { type: string }
        country_code: { type: integer }
        domain_name: { type: [string, "null"] }
        main_language_id: { type: integer, format: int64 }
        secondary_language_id: { type: [integer, "null"], format: int64 }
        tertiary_language_id: { type: [integer, "null"], format: int64 }
        currency_id: { type: integer, format: int64 }
        nationality: { type: string }
    CountryPatch:
      type: object
      properties:
        name: { type: string }
        iso2: { type: string }
        iso3: { type: string }
        country_code: { type: integer }
        domain_name: { type: [string, "null"] }
        main_language_id: { type: integer, format: int64 }
        secondary_language_id: { type: [integer, "null"], format: int64 }
        tertiary_language_id: { type: [integer, "null"], format: int64 }
        currency_id: { type: integer, format: int64 }
        nationality: { type: string }

    Currency:
      type: object
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
        iso: { type: string }
        symbol: { type: [string, "null"] }
    CurrencyCreate:
      type: object
      required: [name, iso]
      properties:
        id: { type: [integer, "null"], format: int64 }
        name: { type: string }
        iso: { type: string }
        symbol: { type: [string, "null"] }
    CurrencyPatch:
      type: object
      properties:
        name: { type: string }
        iso: { type: string }
        symbol: { type: [string, "null"] }

    Language:
      type: object
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
        iso2: { type: string }
        iso3: { type: [string, "null"] }
        original_name: { type: string }
    LanguageCreate:
      type: object
      required: [name, iso2, original_name]
      properties:
        id: { type: [integer, "null"], format: int64 }
        name: { type: string }
        iso2: { type: string }
        iso3: { type: [string, "null"] }
        original_name: { type: string }
    LanguagePatch:
      type: object
      properties:
        name: { type: string }
        iso2: { type: string }
        iso3: { type: [string, "null"] }
        original_name: { type: string }

    Manufacturer:
      type: object
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
        base_city_id: { type: integer, format: int64 }
    ManufacturerCreate:
      type: object
      required: [name, base_city_id]
      properties:
        id: { type: [integer, "null"], format: int64 }
        name: { type: string }
        base_city_id: { type: integer, format: int64 }
    ManufacturerPatch:
      type: object
      properties:
        name: { type: string }
        base_city_id: { type: integer, format: int64 }

# ---------------------------------------------------------------------------
# Paths
# ---------------------------------------------------------------------------
paths:

  /hello/{name}:
    get:
      tags: [Hello-World]
      summary: Greeting
      parameters:
        - { name: name, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: Greeting text }

  # ===================== Airlines =====================
  /airlines:
    get:
      tags: [Airlines]
      summary: List airlines
      parameters:
        - $ref: '#/components/parameters/ReturnOnly'
        - $ref: '#/components/parameters/SortBy'
        - $ref: '#/components/parameters/Order'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/Airline' } }
        '400': { $ref: '#/components/responses/BadRequest' }
    post:
      tags: [Airlines]
      summary: Create airline
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AirlineCreate' }
      responses:
        '201':
          description: Created
          content: { application/json: { schema: { type: integer, format: int64 } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/Unprocessable' }
  /airlines/filter:
    get:
      tags: [Airlines]
      summary: Filter airlines by an airline field
      parameters:
        - $ref: '#/components/parameters/Field'
        - $ref: '#/components/parameters/Operator'
        - $ref: '#/components/parameters/Value'
        - $ref: '#/components/parameters/SortBy'
        - $ref: '#/components/parameters/Order'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/Airline' } }
        '400': { $ref: '#/components/responses/BadRequest' }
  /airlines/country/filter:
    get:
      tags: [Airlines]
      summary: Filter airlines by a country field
      parameters:
        - $ref: '#/components/parameters/Field'
        - $ref: '#/components/parameters/Operator'
        - $ref: '#/components/parameters/Value'
        - $ref: '#/components/parameters/SortBy'
        - $ref: '#/components/parameters/Order'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/Airline' } }
        '400': { $ref: '#/components/responses/BadRequest' }
  /airlines/{id}:
    parameters: [ { $ref: '#/components/parameters/Id' } ]
    head:
      tags: [Airlines]
      summary: Airline exists?
      responses: { '200': { description: Exists }, '404': { $ref: '#/components/responses/NotFound' } }
    get:
      tags: [Airlines]
      summary: Get airline by id
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Airline' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Airlines]
      summary: Replace airline
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/AirlineCreate' } } } }
      responses:
        '200': { description: Updated, content: { application/json: { schema: { type: integer, format: int64 } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/Unprocessable' }
    patch:
      tags: [Airlines]
      summary: Partially update airline
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/AirlinePatch' } } } }
      responses:
        '200': { description: Updated, content: { application/json: { schema: { $ref: '#/components/schemas/Airline' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/Unprocessable' }
    delete:
      tags: [Airlines]
      summary: Delete airline
      responses: { '204': { description: Deleted }, '404': { $ref: '#/components/responses/NotFound' } }

  # ===================== Airline-Airplanes (Fleet) =====================
  /airline-airplanes:
    get:
      tags: [Airline-Airplanes (Fleet)]
      summary: List fleet entries
      parameters:
        - $ref: '#/components/parameters/ReturnOnly'
        - $ref: '#/components/parameters/SortBy'
        - $ref: '#/components/parameters/Order'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/AirlineAirplane' } } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
    post:
      tags: [Airline-Airplanes (Fleet)]
      summary: Create fleet entry
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/AirlineAirplaneCreate' } } } }
      responses:
        '201': { description: Created, content: { application/json: { schema: { type: integer, format: int64 } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/Unprocessable' }
  /airline-airplanes/filter:
    get:
      tags: [Airline-Airplanes (Fleet)]
      summary: Filter fleet entries by a fleet-entry field
      parameters:
        - $ref: '#/components/parameters/Field'
        - $ref: '#/components/parameters/Operator'
        - $ref: '#/components/parameters/Value'
        - $ref: '#/components/parameters/SortBy'
        - $ref: '#/components/parameters/Order'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/AirlineAirplane' } } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
  /airline-airplanes/airline/filter:
    get:
      tags: [Airline-Airplanes (Fleet)]
      summary: Filter fleet entries by an airline field
      parameters:
        - $ref: '#/components/parameters/Field'
        - $ref: '#/components/parameters/Operator'
        - $ref: '#/components/parameters/Value'
        - $ref: '#/components/parameters/SortBy'
        - $ref: '#/components/parameters/Order'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/AirlineAirplane' } } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
  /airline-airplanes/airplane/filter:
    get:
      tags: [Airline-Airplanes (Fleet)]
      summary: Filter fleet entries by an airplane field
      parameters:
        - $ref: '#/components/parameters/Field'
        - $ref: '#/components/parameters/Operator'
        - $ref: '#/components/parameters/Value'
        - $ref: '#/components/parameters/SortBy'
        - $ref: '#/components/parameters/Order'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/AirlineAirplane' } } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
  /airline-airplanes/airline/{airline_id}/airplane/{airplane_id}:
    get:
      tags: [Airline-Airplanes (Fleet)]
      summary: Get the fleet entry for an (airline, airplane) pair
      parameters:
        - { name: airline_id, in: path, required: true, schema: { type: integer, format: int64 } }
        - { name: airplane_id, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/AirlineAirplane' } } } }
        '404': { $ref: '#/components/responses/NotFound' }
  /airline-airplanes/{id}:
    parameters: [ { $ref: '#/components/parameters/Id' } ]
    head:
      tags: [Airline-Airplanes (Fleet)]
      summary: Fleet entry exists?
      responses: { '200': { description: Exists }, '404': { $ref: '#/components/responses/NotFound' } }
    get:
      tags: [Airline-Airplanes (Fleet)]
      summary: Get fleet entry by id
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/AirlineAirplane' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Airline-Airplanes (Fleet)]
      summary: Replace fleet entry
