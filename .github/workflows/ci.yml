name: CI

# A push to a branch that also has an open PR fires both `push` and
# `pull_request`. We keep both triggers so fork PRs (which produce no push
# event here) still get checked, but the `if` guard on the `lint` job below
# skips the duplicate `pull_request` run for same-repo branches.
#
# No `paths` filter here: filtering at the trigger level means the workflow
# never runs at all for a docs-only change, so a required check never gets a
# check run and stays "Expected" forever, permanently blocking merge. Instead,
# the `changes` job below detects whether the diff touches anything that can
# affect the build, and every other job's `if:` skips when it doesn't. A
# skipped job still reports a `success`-equivalent conclusion to branch
# protection / rulesets, so required checks are satisfied either way.
on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect relevant changes
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            relevant:
              - 'modules/**'
              - 'build.sbt'
              - 'project/**'
              - '.github/workflows/ci.yml'

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    needs: changes
    # Run only when something relevant changed, and on every push, but on
    # pull_request only for forks — a same-repo branch's push already covers
    # it. `test` and `integration-test` chain off this job's result via
    # `needs`, so skipping it here skips the whole pipeline.
    if: >
      needs.changes.outputs.relevant == 'true' &&
      (github.event_name == 'push' || github.event.pull_request.head.repo.full_name != github.repository)
    steps:
      - &checkout
        uses: actions/checkout@v4
      - &setup-java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'sbt'
      - &setup-sbt
        uses: sbt/setup-sbt@v1
      - name: Check formatting and linting (scalafmt, scalafix)
        # Single sbt invocation, same reasoning as the unit-test job below: separate
        # `sbt` calls occasionally fail on the sbtn thin-client handoff to the
        # leftover background server (exit 1, no output).
        run: sbt "scalafmtCheckAll; scalafixAll --check"

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [changes, lint]
    if: needs.changes.outputs.relevant == 'true' && needs.lint.result == 'success'
    steps:
      - *checkout
      - *setup-java
      - *setup-sbt
      - name: Run unit tests
        # Single sbt invocation so all modules share one server. Separate
        # `sbt <module>/test` calls occasionally fail on the sbtn thin-client
        # handoff to the leftover background server (exit 1, no output).
        run: sbt "domain/test; syntax/test; api/test"

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [changes, test]
    if: needs.changes.outputs.relevant == 'true' && needs.test.result == 'success'
    steps:
      - *checkout
      - *setup-java
      - *setup-sbt
      - name: Run persistence integration tests
        run: sbt persistenceIt/test
