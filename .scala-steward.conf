# scala-steward configuration
# Docs: https://github.com/scala-steward-org/scala-steward/blob/main/docs/repo-specific-configuration.md

# Open update PRs at most once a week (the hosted bot otherwise runs ~daily).
pullRequests.frequency = "7 days"

# Bundle all patch-level bumps into a single PR to keep the noise down,
# since merging is manual. Minor/major updates still get their own PRs.
pullRequests.grouping = [
  { name = "patches", title = "Patch updates", filter = [ { version = "patch" } ] },
  { name = "minor_major", "title" = "Minor/major updates", "filter" = [{"version" = "minor"}, {"version" = "major"}] },
  { name = "typelevel", "title" = "Typelevel updates", "filter" = [{"group" = "org.typelevel"}, {"group" = "org.http4s"}, {"group" = "org.tpolecat"}, {"group" = "com.github.pureconfig"}] },
]

# Scala Steward will ignore dependency update versions while they are newer than
# the specified minimum age.
#
# Scala Steward records the first time it sees any artefact version and calculates
# the artefact version's age from that time.
updates.cooldown = {
  minimumAge: "7 days"
}

updatePullRequests = "always"

# Re-run scalafmt after an update so PRs land already formatted to .scalafmt.conf,
# keeping the CI `lint` job (scalafmtCheckAll) green.
scalafmt.runAfterUpgrading = true

# Pin the scalafmt version. Newer releases (2.7.x) deprecate the preset syntax
# this repo's .scalafmt.conf uses and crash `scalafmtCheckAll` on our sources,
# so we stay on 2.4.x and ignore scalafmt-core bumps.
updates.ignore = [
  { groupId = "org.scalameta", artifactId = "scalafmt-core" }
]